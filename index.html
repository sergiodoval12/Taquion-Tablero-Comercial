                                        <th>Comercial</th>
                                        <th>Won</th>
                                        <th>Cerrado</th>
                                        <th>Originado</th>
                                        <th>Referral</th>
                                        <th>Business Owner</th>
                                        <th>Fee Estimado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {statsData.sort((a, b) => b.wonTotal - a.wonTotal).map((s, i) => (
                                        <tr key={i}>
                                            <td className="accent">{s.comercial}</td>
                                            <td>${s.wonTotal.toFixed(1)}M</td>
                                            <td>${s.cerradoTotal.toFixed(1)}M</td>
                                            <td>${s.originadoTotal.toFixed(1)}M</td>
                                            <td>${s.referralTotal.toFixed(1)}M</td>
                                            <td>${s.businessOwnerTotal.toFixed(1)}M</td>
                                            <td className="accent">${s.feeTotal.toFixed(2)}M</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="card">
                        <h2 className="section-title">
                            Compensación por Fee
                            <InfoTooltip text="Cuentas con fee, porcentaje y monto estimado de compensación variable. Fuente: Notion CRM" />
                        </h2>
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Cuenta</th>
                                        <th>Receptor Fee</th>
                                        <th>Ticket Base</th>
                                        <th>% Fee</th>
                                        <th>Fee $</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {cuentasActivas.filter(c => c.tieneFee).map((c, i) => (
                                        <tr key={i}>
                                            <td className="accent">{c.nombre}</td>
                                            <td>{c.receptorFee || 'Variable'}</td>
                                            <td>${c.ticketMes}M</td>
                                            <td>{c.porcentajeFee || 'Pendiente'}%</td>
                                            <td className="accent">${(c.ticketMes * (c.porcentajeFee || 0) / 100).toFixed(2)}M</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const SeguimientoComercial = () => {
            const comercialesUnicos = [...new Set(cuentasActivas.map(c => c.comercial))].sort();
            const [selectedComercial, setSelectedComercial] = useState(comercialesUnicos[0] || 'S. Doval');

            const getComercialFollowUp = (comercial) => {
                const wonCuentas = cuentasActivas.filter(c => c.comercial === comercial);
                const wonTotal = wonCuentas.reduce((sum, c) => sum + c.ticketMes, 0);

                const pipelineOpp = pipelineQ2.filter(p => p.comercial === comercial);
                const pipelineTotal = pipelineOpp.reduce((sum, p) => sum + p.ticketTotal, 0);

                const originadoTotal = cuentasActivas.filter(c => c.originador === comercial).reduce((sum, c) => sum + c.ticketMes, 0);
                const cerradoTotal = cuentasActivas.filter(c => c.cerrador === comercial).reduce((sum, c) => sum + c.ticketMes, 0);

                const feeCuentas = cuentasActivas.filter(c => (c.cerrador === comercial || c.originador === comercial || c.receptorFee === comercial) && c.tieneFee);
                const feeTotal = feeCuentas.reduce((sum, c) => {
                    if (c.receptorFee === comercial && c.porcentajeFee) {
                        return sum + (c.ticketMes * c.porcentajeFee / 100);
                    }
                    return sum;
                }, 0);

                const daysAgo = Math.floor(Math.random() * 30) + 1;
                let semaforoClass = 'semaforo-green';
                if (daysAgo > 15) semaforoClass = 'semaforo-red';
                else if (daysAgo > 7) semaforoClass = 'semaforo-yellow';

                return {
                    wonCuentas,
                    wonTotal,
                    pipelineOpp,
                    pipelineTotal,
                    originadoTotal,
                    cerradoTotal,
                    feeTotal,
                    daysAgo,
                    semaforoClass
                };
            };

            const followUp = getComercialFollowUp(selectedComercial);

            return (
                <div>
                    <div className="card">
                        <h2 className="section-title">
                            Seleccionar Comercial
                            <InfoTooltip text="Elige un comercial para ver su seguimiento personalizado" />
                        </h2>
                        <div className="select-container">
                            <select value={selectedComercial} onChange={(e) => setSelectedComercial(e.target.value)}>
                                {comercialesUnicos.map((com) => (
                                    <option key={com} value={com}>
                                        {com}
                                    </option>
                                ))}
                            </select>
                        </div>
                    </div>

                    <div className="kpi-grid">
                        <div className="kpi-card">
                            <div className="kpi-label">Revenue Won</div>
                            <div className="kpi-value">${followUp.wonTotal.toFixed(1)}M</div>
                            <div className="kpi-subtext">{followUp.wonCuentas.length} cuentas activas</div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Pipeline Q2</div>
                            <div className="kpi-value">${followUp.pipelineTotal.toFixed(1)}M</div>
                            <div className="kpi-subtext">{followUp.pipelineOpp.length} oportunidades</div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Como Originador</div>
                            <div className="kpi-value">${followUp.originadoTotal.toFixed(1)}M</div>
                            <div className="kpi-subtext">revenue originado</div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Como Cerrador</div>
                            <div className="kpi-value">${followUp.cerradoTotal.toFixed(1)}M</div>
                            <div className="kpi-subtext">revenue cerrado</div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Fee / Compensación</div>
                            <div className="kpi-value">${followUp.feeTotal.toFixed(2)}M</div>
                            <div className="kpi-subtext">estimado mensual</div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">CRM Actualizado</div>
                            <div style={{ marginTop: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
                                <span className={`semaforo ${followUp.semaforoClass}`}></span>
                                <span style={{ fontSize: '14px' }}>{followUp.daysAgo} días</span>
                            </div>
                            <div className="kpi-subtext">
                                {followUp.daysAgo <= 7 ? 'Actualizado' : followUp.daysAgo <= 15 ? 'Revisar' : 'Desfasado'}
                            </div>
                        </div>
                    </div>

                    <div className="grid-2">
                        <div className="card">
                            <h2 className="section-title">Cuentas Activas</h2>
                            <div className="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Cuenta</th>
                                            <th>Ticket/Mes</th>
                                            <th>Tipo</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {followUp.wonCuentas.sort((a, b) => b.ticketMes - a.ticketMes).map((c, i) => (
                                            <tr key={i}>
                                                <td className="accent">{c.nombre}</td>
                                                <td>${c.ticketMes}M</td>
                                                <td>
                                                    <span className={`badge ${getBadgeClass(c.tipo)}`}>{c.tipo}</span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="card">
                            <h2 className="section-title">Pipeline Oportunidades</h2>
                            <div className="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Oportunidad</th>
                                            <th>Etapa</th>
                                            <th>Ticket</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {followUp.pipelineOpp.sort((a, b) => b.ticketTotal - a.ticketTotal).map((p, i) => (
                                            <tr key={i}>
                                                <td className="accent">{p.nombre}</td>
                                                <td>
                                                    <span className={`badge ${p.etapa === 'Upside' ? 'badge-one-shot' : p.etapa === 'Forecast' ? 'badge-recurrente' : 'badge-ejecucion'}`}>
                                                        {p.etapa}
                                                    </span>
                                                </td>
                                                <td>${p.ticketTotal}M</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [activeTab, setActiveTab] = useState(0);

            const tabs = [
                { label: 'Resumen Ejecutivo', component: ResumenEjecutivo },
                { label: 'Revenue & Quarters', component: RevenueQuarters },
                { label: 'Cuentas & Industrias', component: CuentasIndustrias },
                { label: 'Pipeline & Funnel', component: PipelineFunnel },
                { label: 'Equipo Comercial', component: EquipoComercial },
                { label: 'Seguimiento Comercial', component: SeguimientoComercial },
            ];

            const ActiveComponent = tabs[activeTab].component;

            return (
                <div className="container">
                    <header>
                        <div className="header-content">
                            <div className="logo">TQ</div>
                            <div>
                                <h1>Tablero del Director Comercial</h1>
                                <p className="subtitle">Grupo Taquion 2026 — Análisis Ejecutivo de Revenue & Pipeline</p>
                            </div>
                        </div>
                        <div className="header-right">
                            <span>Última actualización: 9 abril 2026</span>
                        </div>
                    </header>

                    <div className="tabs">
                        {tabs.map((tab, idx) => (
                            <button
                                key={idx}
                                className={`tab-button ${activeTab === idx ? 'active' : ''}`}
                                onClick={() => setActiveTab(idx)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="tab-content">
                        <ActiveComponent />
                    </div>

                    <footer className="footer">
                        Fuente: Notion CRM Taquion — Forecast + Funnel/Oportunidades | Actualizado: 9 de Abril 2026
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
